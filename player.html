<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        .video-container {
            background-color: #000;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        video {
            display: block;
            border-radius: 4px;
        }
        .title {
            color: #fff;
            text-align: center;
            margin-bottom: 15px;
        }
        .input-container {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="text"] {
            flex: 1;
            min-width: 250px;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #333;
            color: #fff;
            font-size: 14px;
        }
        input[type="text"]::placeholder {
            color: #999;
        }
        button {
            padding: 10px 20px;
            background-color: #0066cc;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0052a3;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <h2 class="title">视频播放</h2>
        <div class="input-container">
            <input type="text" id="videoUrl" placeholder="输入视频 URL (例如: http://example.com/video.mp4)" value="">
            <button onclick="loadVideo()">加载视频</button>
        </div>
        <video id="videoPlayer" width="800" height="600" controls autoplay muted>
            <source src="" type="video/mp4">
            您的浏览器不支持视频播放。
        </video>
    </div>

    <script>
        function loadVideo() {
            const videoUrl = document.getElementById('videoUrl').value.trim();
            if (videoUrl) {
                const videoPlayer = document.getElementById('videoPlayer');
                const source = videoPlayer.querySelector('source');
                source.src = videoUrl;
                videoPlayer.load();
                videoPlayer.play();
            } else {
                alert('请输入有效的视频 URL');
            }
        }

        // 按 Enter 键加载视频
        document.getElementById('videoUrl').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                loadVideo();
            }
        });
    </script>
</body>
</html>
